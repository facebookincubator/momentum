name: Publish to GHE

on:
  push:
    branches:
      - "main"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      # - name: Checkout
      #   uses: actions/checkout@v4
      #   with:
      #     fetch-depth: 0 # Fetches all history for all branches and tags

      # - name: Push Mirror to GitHub Enterprise
      #   run: |
      #     git checkout main
      #     git push https://${{ secrets.INTERNAL_GHE_TOKEN }}@${{ secrets.INTERNAL_GHE_REPO_URL }} main:main --force
      #     git push https://${{ secrets.INTERNAL_GHE_TOKEN }}@${{ secrets.INTERNAL_GHE_REPO_URL }} --tags

      - name: Push mirror to GitHub Enterprise
        uses: wearerequired/git-mirror-action@v1
        env:
          SSH_PRIVATE_KEY: ${{ secrets.INTERNAL_GHE_TOKEN }}
        with:
          source-repo: "git@github.com:facebookincubator/momentum.git"
          destination-repo: "${{ secrets.INTERNAL_GHE_REPO_URL }}"
