name: CI Ubuntu

on:
  push:
    branches:
      - "**"
    paths-ignore:
      - "**/website/**"
  pull_request:
    branches:
      - "**"
    paths-ignore:
      - "**/website/**"

jobs:
  momentum:
    name: momentum
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.8.1
        with:
          cache: true
      - name: Build and test Momentum
        run: |
          pixi run test
      - name: Install Momentum and Build hello_world
        run: |
          pixi run install
          pixi run cmake \
            -S momentum/examples/hello_world \
            -B momentum/examples/hello_world/build \
            -DCMAKE_BUILD_TYPE=Release
          pixi run cmake --build momentum/examples/hello_world/build

  pymomentum:
    name: pymomentum
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.8.1
        with:
          cache: true
      - name: Build PyMomentum
        run: |
          pixi run build_pymomentum
          pixi run test_pymomentum

  pymomentum_wheel:
    name: pymomentum-wheel
    runs-on: ubuntu-20.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.8.1
        with:
          cache: true
      - name: Build wheel
        run: |
          pixi run build_pymomentum_wheel
      - name: Upload wheel artifact
        uses: actions/upload-artifact@v3
        with:
          name: pymomentum-wheel
          path: dist/*.whl
