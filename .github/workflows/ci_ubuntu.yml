name: CI Ubuntu

on:
  push:
    branches:
      - "**"
    paths-ignore:
      - "**/website/**"
  pull_request:
    branches:
      - "**"
    paths-ignore:
      - "**/website/**"

jobs:
  momentum:
    name: momentum-ubuntu
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.8.1
        with:
          cache: true
      - name: Build and test Momentum
        run: |
          pixi run test
      - name: Install Momentum and Build hello_world
        run: |
          pixi run install
          pixi run cmake \
            -S momentum/examples/hello_world \
            -B momentum/examples/hello_world/build \
            -DCMAKE_BUILD_TYPE=Release
          pixi run cmake --build momentum/examples/hello_world/build

  pymomentum:
    name: pymomentum-ubuntu
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.8.1
        with:
          cache: true
      - name: Build PyMomentum
        run: |
          pixi run build_pymomentum
          pixi run test_pymomentum

  pymomentum_wheel:
    name: pymomentum-wheel-ubuntu
    runs-on: ubuntu-20.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.8.1
        with:
          cache: true
      - name: Build PyMomentum
        run: |
          pixi shell
      - name: Build the wheel
        run: python setup.py bdist_wheel
      - name: Install auditwheel
        run: pip install auditwheel
      - name: Repair the wheel with auditwheel
        run: |
          WHEEL_FILE=$(ls dist/*.whl)
          auditwheel repair "$WHEEL_FILE" -w repaired_wheel/
      - name: List repaired wheel
        run: ls repaired_wheel/
